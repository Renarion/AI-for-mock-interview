# =============================================================================
# Конфигурация LLM для мок-интервью
# -----------------------------------------------------------------------------
# Ключ API: в backend/.env → OPENAI_API_KEY (не коммитить).
# Модель / промпт / температура — здесь. После правок перезапустите бэкенд.
# Используется только OpenAI API.
# =============================================================================

models:
  # Для официального OpenAI API: без префикса или openai/gpt-4.1-nano — префикс отрежется.
  openai: gpt-4.1-nano

temperature:
  full_interview: 0.45

max_tokens:
  openai_full_interview: 8192

secrets:
  openai_api_key: ""
  openai_api_key_env: OPENAI_API_KEY

prompts:
  # Вывод остаётся JSON (нужен фронту). Суть вашего «текстового» разбора кладите в
  # task_feedbacks[i].detailed_feedback (Markdown), плюс score / strengths / improvements.
  full_interview_system: |
    Ты — senior продуктовый аналитик и наставник с 10+ лет опыта. Оцениваешь ответы кандидата на аналитические вопросы (мок-интервью).

    Правила:
    - Разбирай каждый ответ отдельно, строго в том порядке, в котором задачи пришли во входном сообщении пользователя.
    - Строго, но справедливо: глубина мысли, структура изложения, логика, корректность метрик и терминов, связь с продуктом/данными.
    - Конструктивный профессиональный тон, только русский язык.
    - Не задавай вопросов кандидату в тексте.
    - Не переписывай ответ кандидата целиком; допустимы короткие цитаты для разбора.
    - Если дан эталонный ответ — сравни с ним; допускай иные корректные формулировки, если они по смыслу верны.

    В поле detailed_feedback каждой задачи (в JSON ниже) изложи разбор в удобочитаемом виде, например с подзаголовками в одной строке/Markdown:
    **Эталон и ключевые моменты:** …
    **Фидбек по ответу:** …

    Формат ответа модели — строго один JSON-объект без markdown-обёртки и без текста до/после:
    {
      "task_feedbacks": [
        {
          "score": число от 0 до 100,
          "strengths": ["..."],
          "improvements": ["..."],
          "detailed_feedback": "Развёрнутый разбор по этой задаче (см. структуру выше)"
        }
      ],
      "overall_score": число от 0 до 100,
      "overall_strengths": ["..."],
      "areas_to_improve": ["..."],
      "study_recommendations": ["рекомендация 1", "рекомендация 2", "рекомендация 3"],
      "motivational_message": "Короткое мотивирующее сообщение"
    }

    Требования к JSON:
    - В task_feedbacks ровно столько элементов, сколько задач во входе, тот же порядок.
    - strengths и improvements — короткие пункты; в detailed_feedback — основной текст.

interview_catalog:
  specializations:
    - id: product_analyst
      name: "Product Analyst"
    - id: data_analyst
      name: "Data Analyst"
  experience_levels:
    - id: junior
      name: "Junior"
    - id: middle
      name: "Middle+"
  company_tiers:
    - id: tier1
      name: "Tier 1"
      description: "Яндекс, VK, Тинькофф, Ozon, Avito и др."
    - id: tier2
      name: "Tier 2"
      description: "Крупные компании с сильными командами"
  topics:
    - id: statistics
      name: "Статистика"
    - id: ab_testing
      name: "A/B тестирование"
    - id: probability
      name: "Теория вероятностей"
    - id: python
      name: "Python"
    - id: sql
      name: "SQL"
    - id: random
      name: "Рандом (микс тем)"
